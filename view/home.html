<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLab — Learn. Build. Master.</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg: #0c0c0f;
            --surface: #141418;
            --border: #232329;
            --accent: #00e5a0;
            --text: #f0f0f0;
            --muted: #888;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 48px;
            background: rgba(12,12,15,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .nav-icons { display: flex; gap: 18px; }

        .nav-icon-link {
            text-decoration: none;
            font-size: 24px;
            transition: 0.2s;
            filter: brightness(10);
            display: inline-block;
        }

        .nav-icon-link:hover { transform: scale(1.2); filter: brightness(1) sepia(1) saturate(5) hue-rotate(100deg); }

        /* Hero */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 80px;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.2);
            border-radius: 999px;
            padding: 6px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 32px;
            animation: fadeUp 0.6s ease both;
        }

        .hero-tag::before { content: '◆'; font-size: 8px; }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(52px, 9vw, 110px);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            margin-bottom: 24px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .hero h1 .outline {
            -webkit-text-stroke: 2px var(--accent);
            color: transparent;
        }

        .hero h1 .solid { color: var(--text); }

        .hero-sub {
            font-size: 18px;
            color: var(--muted);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 48px;
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .hero-sub code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            background: rgba(0,229,160,0.08);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .hero-btns {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-primary:hover { opacity: 0.85; transform: scale(0.98); }

        .btn-outline {
            background: none;
            color: var(--text);
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            border: 1.5px solid var(--border);
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* Stats */
        .stats {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 60px 40px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat { text-align: center; }

        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
        }

        .footer-logo span { color: var(--accent); }

        .footer-links {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--accent); }

        .footer-copy { font-size: 13px; color: var(--muted); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="logo" href="/">
        <div class="logo-icon">⚗️</div>
        <div class="logo-text">Code<span>Lab</span></div>
    </a>
    <div class="nav-icons">
        <a href="/search" class="nav-icon-link">🔍</a>
        <a href="/login"  class="nav-icon-link">👤</a>
        <a href="/cart"  class="nav-icon-link">🛒</a>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="hero-tag">thecodelab.in</div>
    <h1>
        <span class="solid">Learn.</span><br>
        <span class="outline">Build.</span><br>
        <span class="solid">Master.</span>
    </h1>
    <p class="hero-sub">
        Premium notes, tutorials and resources for <code>developers</code> who want to level up fast.
    </p>
    <div class="hero-btns">
        <a href="/cart" class="btn-primary">Browse Notes →</a>
        <a href="/search" class="btn-outline">Explore Topics</a>
    </div>
</section>

<!-- Stats -->
<div class="stats">
    <div class="stat">
        <div class="stat-num">4+</div>
        <div class="stat-label">Topic Notes</div>
    </div>
    <div class="stat">
        <div class="stat-num">150+</div>
        <div class="stat-label">Pages of Content</div>
    </div>
    <div class="stat">
        <div class="stat-num">₹99</div>
        <div class="stat-label">Starting Price</div>
    </div>
    <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">Lifetime Access</div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-logo">Code<span>Lab</span></div>
    <ul class="footer-links">
        <li><a href="/">Home</a></li>
        <li><a href="/services">Services</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
  
</footer>

</body>
</html>
