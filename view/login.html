<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CodeLab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'DM Sans',sans-serif;
}

:root{
    --bg:#0c0c0f;
    --surface:#141418;
    --border:#232329;
    --accent:#00e5a0;
    --text:#f0f0f0;
    --muted:#888;
}

body{
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
}

/* Home Page Grid Background */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
    background-size:50px 50px;
    pointer-events:none;
    z-index:0;
}

/* Login Section */
.login-page-container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    position:relative;
    z-index:1;
}

.login-card{
    width:350px;
    background:var(--surface);
    border:1px solid var(--border);
    padding:30px;
    border-radius:16px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
    background: rgba(250, 248, 248, 0.534)
}

.login-card h2{
    text-align:center;
    color:var(--accent);
    margin-bottom:25px;
    font-size:32px;
}

.login-card input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid var(--border);
    border-radius:8px;
    background:#0c0c0f;
    color:white;
    outline:none;
}

.login-card input::placeholder{
    color:#888;
}

.login-card button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:.3s;
}

.login-card button:hover{
    opacity:.85;
}

.login-card p{
    text-align:center;
    margin-top:20px;
}

.login-card a{
    color:var(--accent);
    text-decoration:none;
}

/* Footer */
.login-page-footer{
    position:relative;
    z-index:1;
    background:#141418;
    border-top:1px solid var(--border);
    padding:40px;
}

.login-page-footer-content{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:30px;
}

.login-page-company h2{
    color:var(--accent);
    margin-bottom:10px;
}

.login-page-company p{
    color:var(--muted);
}

.login-page-links,
.login-page-support{
    display:flex;
    flex-direction:column;
}

.login-page-links h3,
.login-page-support h3{
    margin-bottom:10px;
}

.login-page-links a,
.login-page-support a{
    color:var(--muted);
    text-decoration:none;
    margin:5px 0;
}

.login-page-links a:hover,
.login-page-support a:hover{
    color:var(--accent);
}

.login-page-copyright{
    margin-top:20px;
    text-align:center;
    border-top:1px solid var(--border);
    padding-top:15px;
    color:var(--muted);
}

@media(max-width:768px){

.login-card{
    width:100%;
    max-width:350px;
}

.login-page-footer-content{
    flex-direction:column;
}
}
</style>
</head>

<body>

<div class="login-page-container">

    <div class="login-card">

        <h2>Login</h2>

        <form>
            <input type="email" placeholder="Enter Email">
            <input type="password" placeholder="Enter Password">

            <button type="submit">Login</button>
        </form>

        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </div>

</div>

<footer class="login-page-footer">

    <div class="login-page-footer-content">

        <div class="login-page-company">
            <h2>CodeLab</h2>
            <p>Secure login portal for accessing your account.</p>
        </div>

        <div class="login-page-links">
            <h3>Quick Links</h3>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>

        <div class="login-page-support">
            <h3>Support</h3>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
        </div>

    </div>

    

</footer>

</body>
</html>
